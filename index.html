<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GastoPro - Minimalist Expense Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0c0e14">
    <link rel="apple-touch-icon" href="icons/app_icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>GastoPro</h1>
            <div class="header-actions">
                <button class="btn-secondary" id="history-btn">
                    <i data-lucide="history" style="width: 14px;"></i>
                </button>
                <button class="btn-secondary" id="new-cycle-btn">
                    <i data-lucide="rotate-ccw" style="width: 14px;"></i>
                    <span>Nuevo Mes</span>
                </button>
            </div>
        </header>

        <div id="date-display" style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px;">Abril 2026</div>

        <!-- Dashboard -->
        <div class="dashboard-card">
            <div class="label">Gastado este mes</div>
            <div class="amount" id="total-spent">0,00 €</div>
            <div class="progress-container">
                <div class="progress-bar" id="total-progress"></div>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <span>Presupuesto</span>
                    <strong id="total-budget">0,00 €</strong>
                </div>
                <div class="stat-item">
                    <span>Ingresos</span>
                    <strong id="total-income" style="color: var(--success);">0,00 €</strong>
                </div>
                <div class="stat-item balance">
                    <span>Balance</span>
                    <strong id="total-balance">0,00 €</strong>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="chart-card">
            <canvas id="balanceChart"></canvas>
        </div>

        <div class="section-title">
            <span>Categorías</span>
            <div style="display: flex; gap: 10px;">
                <button onclick="openIncomeModal()" class="income-btn">+ Ingreso</button>
                <button onclick="openCategoryModal()" style="background:none; border:none; color:var(--primary-color); cursor:pointer;">
                    <i data-lucide="plus-circle" style="width: 20px;"></i>
                </button>
            </div>
        </div>

        <div class="category-list" id="category-list">
            <!-- Categories will be injected here -->
        </div>

        <div class="section-title" style="margin-top: 30px;">
            <span>Gastos Recientes</span>
        </div>
        <div id="recent-expenses-list">
            <!-- Recent expenses will be injected here -->
        </div>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" id="add-expense-btn">
        <i data-lucide="plus"></i>
    </button>

    <!-- Modal for adding expense -->
    <div class="modal-overlay" id="expense-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Nuevo Gasto</div>
                <button class="close-btn" id="close-expense-modal">×</button>
            </div>
            <form id="expense-form">
                <div class="form-group">
                    <label>Importe (€)</label>
                    <input type="number" step="0.01" id="expense-amount" placeholder="0.00" required autofocus>
                </div>
                <div class="form-group">
                    <label>Concepto (Opcional)</label>
                    <input type="text" id="expense-concept" placeholder="Ej: Cena amigos">
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <div class="category-badges" id="modal-category-badges">
                        <!-- Badges will be injected here -->
                    </div>
                </div>
                <button type="submit" class="submit-btn">Guardar Gasto</button>
            </form>
        </div>
    </div>

    <!-- Modal for adding income -->
    <div class="modal-overlay" id="income-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Nuevo Ingreso</div>
                <button class="close-btn" id="close-income-modal">×</button>
            </div>
            <form id="income-form">
                <div class="form-group">
                    <label>Importe (€)</label>
                    <input type="number" step="0.01" id="income-amount" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Concepto</label>
                    <input type="text" id="income-concept" placeholder="Ej: Sueldo, Venta Wallapop...">
                </div>
                <button type="submit" class="submit-btn" style="background: var(--success);">Guardar Ingreso</button>
            </form>
        </div>
    </div>

    <!-- Modal for category management/budget -->

    <div class="modal-overlay" id="category-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Configurar Categoría</div>
                <button class="close-btn" id="close-category-modal">×</button>
            </div>
            <form id="category-form">
                <div class="form-group">
                    <label>Nombre de Categoría</label>
                    <input type="text" id="cat-name" placeholder="Ej: Supermercado" required>
                </div>
                <div class="form-group">
                    <label>Límite Mensual (€)</label>
                    <input type="number" id="cat-limit" placeholder="500" required>
                </div>
                <button type="submit" class="submit-btn" id="cat-submit-btn">Guardar Categoría</button>
                <button type="button" id="cat-delete-btn" class="submit-btn" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; margin-top: 10px; display: none;">Eliminar Categoría</button>
            </form>
        </div>
    </div>

    <!-- Modal for history -->
    <div class="modal-overlay" id="history-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Historial Mensual</div>
                <button class="close-btn" id="close-history-modal">×</button>
            </div>
            <div class="history-list" id="history-list-container">
                <!-- Archive items will be injected here -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
